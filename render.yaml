# Render.com deployment config for Donna's backend.
#
# Setup steps:
#   1. Push to GitHub.
#   2. dashboard.render.com → New → Blueprint → pick this repo.
#   3. Set the secrets marked `sync: false` in the Render UI.
#   4. Update CORS_ALLOW_ORIGINS once you know the final Vercel URL.
#
# Primary storage is MongoDB Atlas (set MONGODB_URI).
#
# Free-tier note: Render no longer allows persistent disks on free services.
# Chroma's semantic-recall index lives at /tmp/chroma — ephemeral, rebuilt on
# every cold start. That's fine: /recall returns empty results when the index
# is empty, and the rest of the app is fully durable in Mongo.

services:
  - type: web
    name: donna-backend
    runtime: docker
    region: oregon
    plan: free
    # Both paths are interpreted relative to the repo root.
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # ----- Required secrets (paste in the Render dashboard) -----
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

      # ----- Required non-secrets -----
      - key: MONGODB_DB
        value: Donna
      - key: VAPID_CLAIM_EMAIL
        value: mailto:admin@donna.app

      # CORS: comma-separated list of allowed frontend origins.
      # Update once Vercel hands you the final URL.
      - key: CORS_ALLOW_ORIGINS
        value: https://donna.vercel.app,http://localhost:3000

      # Chroma index (ephemeral on free tier — no persistent disk).
      - key: CHROMA_DB_PATH
        value: /tmp/chroma

      # Scheduler timezone. Switch to the user's tz before deploy.
      - key: SCHEDULER_TZ
        value: America/New_York
